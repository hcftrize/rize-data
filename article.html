@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');
:root {
  --black:#000; --navy:#0d2d4e; --navy2:#1a3a5c; --bluelt:#e8f0f7;
  --white:#fff; --off:#f7f7f5; --text:#111; --muted:#666;
  --border:#e0e0e0; --shadow:0 2px 20px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Rajdhani',sans-serif;background:var(--white);color:var(--text);min-height:100vh;}
.site-header{width:100%;background:var(--black);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:96px;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,0.08);}
.site-header-logo img{height:72px;display:block;}
.site-nav{display:flex;align-items:center;gap:0;}
.site-nav a{color:rgba(255,255,255,1.0);text-decoration:none;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:6px 20px;transition:color 0.2s;border-right:1px solid rgba(255,255,255,0.1);}
.site-nav a:first-child{border-left:1px solid rgba(255,255,255,0.1);}
.site-nav a:hover,.site-nav a.active{color:#fff;}
.site-nav a.nav-hub{color:#fff;background:var(--navy);border:none;padding:8px 20px;margin-left:16px;letter-spacing:1.5px;transition:background 0.2s;}
.site-nav a.nav-hub:hover{background:var(--navy2);}
.wrap{max-width:1140px;margin:0 auto;padding:0 28px;}
.site-footer{background:var(--black);color:rgba(255,255,255,0.5);padding:40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;margin-top:80px;border-top:1px solid rgba(255,255,255,0.08);}
.footer-logo img{height:60px;opacity:1;}
.footer-nav{display:flex;gap:24px;}
.footer-nav a{color:rgba(255,255,255,1.0);text-decoration:none;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;transition:color 0.2s;}
.footer-nav a:hover{color:#fff;}
.footer-copy{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.25);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#f0f0f0;}::-webkit-scrollbar-thumb{background:var(--navy);}
@media(max-width:768px){
  .site-header{padding:0 16px;height:68px;}.site-header-logo img{height:48px;}
  .site-nav a{font-size:11px;padding:5px 10px;letter-spacing:1.2px;}
  .site-nav a.nav-hub{margin-left:8px;padding:6px 12px;}
  .wrap{padding:0 16px;}
  .site-footer{flex-direction:column;align-items:flex-start;padding:28px 16px;gap:16px;}
}

.hero{background:var(--black);padding:72px 40px 60px;text-align:center;position:relative;overflow:hidden;}
.hero::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--navy),transparent);}
.hero-eyebrow{display:inline-block;font-family:'Rajdhani',sans-serif;font-size:15px;letter-spacing:3px;text-transform:uppercase;color:#fff;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.25);}
.hero h1{font-family:'Rajdhani',sans-serif;font-size:clamp(32px,5vw,62px);font-weight:700;color:#fff;letter-spacing:3px;text-transform:uppercase;line-height:1;margin-bottom:16px;}
.hero h1 span{color:transparent;-webkit-text-stroke:1px rgba(255,255,255,1);}
.hero-sub{font-family:'DM Mono',monospace;font-size:14px;color:rgba(255,255,255,0.75);letter-spacing:0.5px;max-width:560px;margin:0 auto;line-height:1.7;}
.section-label{display:flex;align-items:center;gap:14px;margin:52px 0 28px;}
.section-label span{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--navy);}
.section-label::after{content:"";flex:1;height:1px;background:var(--border);}
.featured{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);margin-bottom:48px;}
.featured-img{background:#111;overflow:hidden;min-height:320px;}
.featured-img img{width:100%;height:100%;object-fit:cover;display:block;opacity:0.9;transition:opacity 0.3s;}
.featured:hover .featured-img img{opacity:1;}
.featured-body{padding:40px 36px;display:flex;flex-direction:column;justify-content:space-between;border-left:1px solid var(--border);}
.article-tag{display:inline-block;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#fff;background:var(--navy);padding:4px 10px;margin-bottom:20px;}
.featured-body h2{font-family:'Rajdhani',sans-serif;font-size:clamp(18px,2.2vw,26px);font-weight:700;letter-spacing:0.5px;line-height:1.25;color:var(--text);margin-bottom:16px;text-transform:uppercase;}
.featured-body h2 a{color:inherit;text-decoration:none;transition:color 0.2s;}
.featured-body h2 a:hover{color:var(--navy);}
.featured-excerpt{font-family:'DM Mono',monospace;font-size:13px;line-height:1.7;color:var(--muted);flex:1;margin-bottom:24px;}
.article-meta{display:flex;align-items:center;justify-content:space-between;padding-top:20px;border-top:1px solid var(--border);}
.article-date{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.read-more{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--navy);text-decoration:none;border-bottom:1px solid var(--navy);padding-bottom:2px;transition:opacity 0.2s;}
.read-more:hover{opacity:0.7;}
.article-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:60px;}
.article-card{border:1px solid var(--border);transition:border-color 0.2s,box-shadow 0.2s;}
.article-card:hover{border-color:var(--navy);box-shadow:var(--shadow);}
.article-card-img{background:#111;overflow:hidden;aspect-ratio:16/9;}
.article-card-img img{width:100%;height:100%;object-fit:cover;display:block;opacity:0.8;transition:opacity 0.3s,transform 0.3s;}
.article-card:hover .article-card-img img{opacity:1;transform:scale(1.02);}
.article-card-body{padding:20px;}
.article-card-body h3{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;line-height:1.3;margin-bottom:10px;}
.article-card-body h3 a{color:var(--text);text-decoration:none;transition:color 0.2s;}
.article-card-body h3 a:hover{color:var(--navy);}
.article-card-excerpt{font-family:'DM Mono',monospace;font-size:12px;line-height:1.65;color:var(--muted);margin-bottom:14px;}
.article-card-meta{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border);}
@media(max-width:900px){.featured{grid-template-columns:1fr;}.featured-body{border-left:none;border-top:1px solid var(--border);padding:24px;}.article-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.hero{padding:48px 16px 40px;}.article-grid{grid-template-columns:1fr;}}


.reading-progress{position:fixed;top:0;left:0;height:3px;background:var(--navy);z-index:200;transition:width 0.1s linear;}
.article-header{background:var(--black);padding:56px 40px 48px;border-bottom:1px solid rgba(255,255,255,0.08);}
.article-header .wrap{max-width:820px;}
.back-link{display:inline-flex;align-items:center;gap:8px;font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.75);text-decoration:none;margin-bottom:28px;transition:background 0.2s,color 0.2s;border:1px solid rgba(255,255,255,0.25);padding:6px 14px;background:rgba(255,255,255,0.05);}
.back-link:hover{background:rgba(255,255,255,0.12);color:#fff;border-color:rgba(255,255,255,0.5);}
.article-header h1{font-family:'Rajdhani',sans-serif;font-size:clamp(22px,4vw,40px);font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;line-height:1.15;margin-bottom:20px;}
.article-byline{display:flex;align-items:center;gap:16px;font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.7);}
.article-cover{width:100%;max-height:480px;object-fit:cover;display:block;}
.article-body{max-width:820px;margin:0 auto;padding:56px 28px 80px;}
.article-body p{font-family:'DM Mono',monospace;font-size:15px;line-height:1.85;color:#222;margin-bottom:24px;text-align:justify;}
.article-body h2{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text);margin:48px 0 16px;padding-bottom:10px;border-bottom:2px solid var(--navy);}
.article-body h3{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text);margin:32px 0 12px;}
.article-body strong{font-family:'DM Mono',monospace;font-weight:500;color:var(--navy);background:rgba(13,45,78,0.06);padding:1px 3px;}
.article-body img{width:100%;display:block;margin:32px 0;border:1px solid var(--border);}
.article-body blockquote{border-left:3px solid var(--navy);padding:16px 24px;margin:32px 0;background:var(--bluelt);font-family:'DM Mono',monospace;font-size:14px;color:var(--navy);}
.article-body a{color:var(--navy);text-decoration:underline;}
@media(max-width:768px){.article-header{padding:36px 16px 32px;}.article-body{padding:36px 16px 60px;}}

</style>
