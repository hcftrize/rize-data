specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Governance
    network: base
    source:
      address: "0x5a134098bDBEb05Da9eAc35439c5624547ed26eE"
      abi: Governance
      startBlock: 28890000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - BondBroken
        - DailyUnbondingQueue
      abis:
        - name: Governance
          file: ./abis/Governance.json
      eventHandlers:
        - event: BondBroken(indexed uint256,uint256)
          handler: handleBondBroken
      file: ./src/mapping.ts
