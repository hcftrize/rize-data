<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>RIZE DATA HUB</title>
  <style>
    :root {
      --bg: #07122b;
      --panel: #0b1838;
      --border: rgba(255,255,255,0.14);
      --text: #f5f1e8;
      --muted: #b7bfd3;
      --accent: #7ee0ff;
      --accent2: #ffd36b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 36px;
      background:
        radial-gradient(circle at top left, rgba(126,224,255,0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(255,211,107,0.08), transparent 24%),
        linear-gradient(180deg, #061022 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Courier New", monospace;
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 28px 0;
      font-size: 48px;
      line-height: 1;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: white;
      text-shadow: 0 0 10px rgba(126,224,255,0.18);
    }

    h2 {
      margin: 0 0 10px 0;
      font-size: 32px;
      line-height: 1.1;
      color: white;
    }

    .sub {
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      padding: 28px;
      margin-bottom: 28px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 18px 28px;
    }

    .metric {
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.015);
    }

    .metric-label {
      display: block;
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .metric-value {
      font-size: 28px;
      color: white;
      font-weight: bold;
      line-height: 1.2;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 18px;
    }

    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      text-align: left;
      font-size: 18px;
    }

    th {
      color: var(--muted);
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    td {
      color: white;
    }

    tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    .small {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
      margin-top: 4px;
    }

    @media (max-width: 900px) {
      body {
        padding: 20px;
      }

      h1 {
        font-size: 36px;
      }

      h2 {
        font-size: 26px;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      th, td {
        font-size: 15px;
        padding: 10px 8px;
      }

      .metric-value {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>MONITOR THE RIZE SITUATION</h1>

    <div class="card">
      <div id="main-data">Loading main data...</div>
    </div>

    <div class="card">
      <h2>Price Comparison vs Other Crypto Market Caps</h2>
      <div class="small">
        Hypothetical RIZE price if RIZE market cap matched each asset’s current market cap.
      </div>
      <div id="comparisons">Loading comparisons...</div>
    </div>
  </div>

  <script>
    async function loadData() {
      const mainBox = document.getElementById("main-data");
      const comparisonBox = document.getElementById("comparisons");

      const compareCoins = [
        { label: "LINK", id: "chainlink" },
        { label: "CC", id: "canton-network" },
        { label: "SHIB", id: "shiba-inu" },
        { label: "QNT", id: "quant-network" },
        { label: "BONK", id: "bonk" },
        { label: "PENGU", id: "pudgy-penguins" },
        { label: "MANA", id: "decentraland" },
        { label: "THETA", id: "theta-token" },
        { label: "ZK", id: "zksync" },
        { label: "MANTRA", id: "mantra" }
      ];

      const allIds = ["rize", ...compareCoins.map(c => c.id)].join(",");

      try {
        const [marketsRes, rizeDetailRes] = await Promise.all([
          fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${allIds}`),
          fetch("https://api.coingecko.com/api/v3/coins/rize")
        ]);

        if (!marketsRes.ok || !rizeDetailRes.ok) {
          mainBox.innerText = "Error loading data";
          comparisonBox.innerText = "Unable to load comparisons.";
          return;
        }

        const markets = await marketsRes.json();
        const rizeDetail = await rizeDetailRes.json();
        const byId = Object.fromEntries(markets.map(c => [c.id, c]));
        const rize = byId["rize"];

        if (!rize) {
          mainBox.innerText = "RIZE data not found.";
          comparisonBox.innerText = "";
          return;
        }

        const price = rize.current_price ?? null;
        const mcap = rize.market_cap ?? null;
        const fdv = rize.fully_diluted_valuation ?? null;
        const circulatingSupply = rize.circulating_supply ?? null;
        const tvl = rizeDetail?.market_data?.total_value_locked?.usd ?? null;

        const mcapTvl = (mcap && tvl) ? (mcap / tvl) : null;
        const fdvTvl = (fdv && tvl) ? (fdv / tvl) : null;

        function fmtUsd(value, digits = 2) {
          if (value === null || value === undefined || Number.isNaN(value)) return "N/A";
          return "$" + Number(value).toLocaleString(undefined, {
            minimumFractionDigits: 0,
            maximumFractionDigits: digits
          });
        }

        function fmtNumber(value, digits = 2) {
          if (value === null || value === undefined || Number.isNaN(value)) return "N/A";
          return Number(value).toLocaleString(undefined, {
            minimumFractionDigits: 0,
            maximumFractionDigits: digits
          });
        }

        mainBox.innerHTML = `
          <div class="metrics">
            <div class="metric">
              <span class="metric-label">Price</span>
              <span class="metric-value">${fmtUsd(price, 8)}</span>
            </div>
            <div class="metric">
              <span class="metric-label">Market Cap</span>
              <span class="metric-value">${fmtUsd(mcap, 0)}</span>
            </div>
            <div class="metric">
              <span class="metric-label">FDV</span>
              <span class="metric-value">${fmtUsd(fdv, 0)}</span>
            </div>
            <div class="metric">
              <span class="metric-label">TVL</span>
              <span class="metric-value">${fmtUsd(tvl, 0)}</span>
            </div>
            <div class="metric">
              <span class="metric-label">MCAP / TVL</span>
              <span class="metric-value">${mcapTvl ? fmtNumber(mcapTvl, 2) : "N/A"}</span>
            </div>
            <div class="metric">
              <span class="metric-label">FDV / TVL</span>
              <span class="metric-value">${fdvTvl ? fmtNumber(fdvTvl, 2) : "N/A"}</span>
            </div>
            <div class="metric">
              <span class="metric-label">Circulating Supply</span>
              <span class="metric-value">${fmtNumber(circulatingSupply, 0)}</span>
            </div>
          </div>
        `;

        let rows = "";

        for (const coin of compareCoins) {
          const target = byId[coin.id];

          if (!target || !target.market_cap || !circulatingSupply || !price || !mcap) {
            rows += `
              <tr>
                <td>${coin.label}</td>
                <td>N/A</td>
                <td>N/A</td>
                <td>N/A</td>
              </tr>
            `;
            continue;
          }

          const targetMcap = target.market_cap;
          const hypotheticalPrice = targetMcap / circulatingSupply;
          const relativeMcapPercent = (mcap / targetMcap) * 100;

          rows += `
            <tr>
              <td>${coin.label}</td>
              <td>${fmtUsd(targetMcap, 0)}</td>
              <td>${fmtUsd(hypotheticalPrice, 6)}</td>
              <td>${fmtNumber(relativeMcapPercent, 2)}%</td>
            </tr>
          `;
        }

        comparisonBox.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Asset</th>
                <th>Target Market Cap</th>
                <th>RIZE Price at Same MCAP</th>
                <th>RIZE MCAP vs Asset</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>
        `;

      } catch (e) {
        mainBox.innerText = "Error loading data";
        comparisonBox.innerText = "Error loading comparisons";
        console.error(e);
      }
    }

    loadData();
  </script>
</body>
</html>
