<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>RIZE Data Hub</title>
  <style>
    body {
      font-family: monospace;
      background: #0a0f1c;
      color: white;
      padding: 40px;
    }
    .box {
      margin-top: 20px;
      line-height: 1.8;
    }
  </style>
</head>

<body>

<h1>RIZE DATA HUB</h1>

<div class="box" id="data">Loading...</div>

<script>
async function loadData() {
  const box = document.getElementById("data");

  try {
    const res = await fetch(
      "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=rize"
    );

    const data = await res.json();
    const r = data[0];

    const price = r.current_price;
    const mcap = r.market_cap;
    const fdv = r.fully_diluted_valuation;
    const supply = r.circulating_supply;

    const ratio = mcap / fdv;

    box.innerHTML = `
      Price: $${price} <br>
      Market Cap: $${mcap.toLocaleString()} <br>
      FDV: $${fdv.toLocaleString()} <br>
      Circulating Supply: ${Math.round(supply).toLocaleString()} <br>
      MCAP / FDV: ${ratio.toFixed(2)}
    `;

  } catch (e) {
    box.innerText = "Error loading data";
    console.error(e);
  }
}

loadData();
</script>

</body>
</html>
