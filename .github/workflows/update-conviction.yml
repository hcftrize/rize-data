name: Update Conviction History

on:
  schedule:
    # Every day at 08:30 UTC (after canton scraper at 08:00)
    - cron: '30 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run conviction scraper
        env:
          ALCHEMY_RPC_URL: ${{ secrets.ALCHEMY_RPC_URL }}
        run: python scrape_conviction.py

      - name: Commit and push to dev
        run: |
          git config user.name "canton-bot"
          git config user.email "bot@tokerize.com"
          git add rize-data-hub/conviction-history.json
          git diff --staged --quiet || git commit -m "chore: update conviction history — $(date +%Y-%m-%d)"
          git push origin dev

      - name: Push data to main as well
        run: |
          git fetch origin main
          git checkout main
          git checkout dev -- rize-data-hub/conviction-history.json
          git add rize-data-hub/conviction-history.json
          git diff --staged --quiet || git commit -m "chore: update conviction history — $(date +%Y-%m-%d)"
          git push origin main
