name: Update Conviction History

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 08:00 UTC
  workflow_dispatch:
    inputs:
      bootstrap:
        description: 'Run bootstrap (first time only — rebuilds full history)'
        required: false
        default: 'false'
        type: boolean

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        env:
          ALCHEMY_RPC_URL: ${{ secrets.ALCHEMY_RPC_URL }}
        run: |
          if [ "${{ github.event.inputs.bootstrap }}" = "true" ]; then
            echo "Running bootstrap..."
            python bootstrap_conviction.py
          else
            python scrape_conviction.py
          fi

      - name: Commit and push to dev
        run: |
          git config user.name "canton-bot"
          git config user.email "bot@tokerize.com"
          git add rize-data-hub/conviction-history.json
          git diff --staged --quiet || git commit -m "chore: update conviction history — $(date +%Y-%m-%d)"
          git push origin dev

      - name: Push data to main
        run: |
          git fetch origin main
          git checkout main
          git checkout dev -- rize-data-hub/conviction-history.json
          git add rize-data-hub/conviction-history.json
          git diff --staged --quiet || git commit -m "chore: update conviction history — $(date +%Y-%m-%d)"
          git push origin main
