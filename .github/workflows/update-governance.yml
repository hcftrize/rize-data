name: Update Governance JSONs (Daily)

on:
  workflow_dispatch:
    inputs:
      subgraph:
        description: 'Subgraph to update (leave empty for all 6)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v3
        with:
          ref: dev
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run incremental updater
        env:
          ORMI_API_KEY:   ${{ secrets.ORMI_API_KEY }}
          ORMI_API_KEY_2: ${{ secrets.ORMI_API_KEY_2 }}
        run: |
          if [ -n "${{ github.event.inputs.subgraph }}" ]; then
            python3 rize-governance-hub/update_governance.py "${{ github.event.inputs.subgraph }}"
          else
            python3 rize-governance-hub/update_governance.py
          fi

      - name: Commit and push to dev
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rize-governance-hub/*.json
          git diff --cached --quiet || git commit -m "chore: governance update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin dev

      - name: Merge JSONs into main
        run: |
          git checkout main
          git checkout dev -- rize-governance-hub/
          git add -f rize-governance-hub/
          git diff --cached --quiet || git commit -m "chore: governance update (main sync) $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin main
