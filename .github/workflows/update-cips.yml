name: Update Canton CIPs

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run CIP scraper
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: python scripts/scrape_cips.py

      - name: Commit and push if changes
        run: |
          git config user.name "canton-bot"
          git config user.email "bot@tokerize.com"
          git add canton-ecosystem/cips.json
          TIMESTAMP=$(date +"%Y-%m-%d")
          COUNT=$(python -c "import json; data=json.load(open('canton-ecosystem/cips.json')); print(len(data))")
          git diff --staged --quiet || git commit -m "chore: update Canton CIPs — $COUNT entries ($TIMESTAMP)"
          git push origin dev
