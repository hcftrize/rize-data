name: Update Canton CIPs

on:
  schedule:
    # Every day at 08:00 UTC
    - cron: '0 8 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      bootstrap:
        description: 'Bootstrap mode — fetch approved dates for all existing CIPs (run once)'
        required: false
        default: 'false'
        type: boolean

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run CIP scraper
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ "${{ github.event.inputs.bootstrap }}" = "true" ]; then
            python scrape_cips.py --bootstrap
          else
            python scrape_cips.py
          fi

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet canton-ecosystem/cips.json || echo "changed=true" >> $GITHUB_OUTPUT
          [ -f HANDLE-THIS-BEFORE-PULL/complete-cip-learnbox.txt ] && echo "changed=true" >> $GITHUB_OUTPUT || true

      - name: Commit and push if changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "canton-bot"
          git config user.email "bot@tokerize.com"
          git add canton-ecosystem/cips.json
          git add HANDLE-THIS-BEFORE-PULL/complete-cip-learnbox.txt 2>/dev/null || true
          TIMESTAMP=$(date +"%Y-%m-%d")
          COUNT=$(python -c "import json; data=json.load(open('canton-ecosystem/cips.json')); print(len(data))")
          git commit -m "chore: update Canton CIPs — $COUNT entries ($TIMESTAMP)" || echo "Nothing to commit"
          git push origin dev
