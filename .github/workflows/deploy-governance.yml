name: Deploy Bond Created Subgraph (Ormi)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Subgraph version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install graph-cli
        run: npm install -g @graphprotocol/graph-cli

      - name: Install dependencies
        working-directory: goldsky-governance
        run: npm install

      - name: Generate types
        working-directory: goldsky-governance
        run: graph codegen

      - name: Build subgraph
        working-directory: goldsky-governance
        run: graph build

      - name: Deploy to Ormi
        working-directory: goldsky-governance
        env:
          ORMI_API_KEY: ${{ secrets.ORMI_API_KEY }}
        run: |
          graph deploy tokerize-bond-created \
            --node https://subgraph.api.ormilabs.com/deploy \
            --ipfs https://subgraph.api.ormilabs.com/ipfs \
            --deploy-key $ORMI_API_KEY \
            --version-label 1.0.0
