name: Update Volume History

on:
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Full 365-day history (true = bootstrap, false = incremental)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        run: |
          if [ "${{ github.event.inputs.bootstrap }}" = "true" ]; then
            python scripts/scrape_volume.py --bootstrap
          else
            python scripts/scrape_volume.py
          fi

      - name: Commit and push to dev
        run: |
          git config user.name  "tokerize-bot"
          git config user.email "bot@tokerize.com"
          git add rize-data-hub/volume-history.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore(data): volume-history $(date -u +%Y-%m-%d)"
            git push origin dev
          fi

      - name: Push data file to main
        run: |
          git fetch origin main
          git checkout main
          git checkout dev -- rize-data-hub/volume-history.json
          git add rize-data-hub/volume-history.json
          git diff --staged --quiet || git commit -m "chore(data): volume-history $(date -u +%Y-%m-%d)"
          git push origin main
