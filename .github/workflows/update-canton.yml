name: Update Canton Ecosystem

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run scraper (diff mode — new entities only)
        run: python scripts/scrape_canton.py --diff

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet canton-ecosystem/entities.json || echo "changed=true" >> $GITHUB_OUTPUT
          [ -f HANDLE-THIS-BEFORE-PULL/canton_missing_entities.txt ] && echo "changed=true" >> $GITHUB_OUTPUT || true

      - name: Commit and push if changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "canton-bot"
          git config user.email "bot@tokerize.com"
          # Always add entities.json
          git add canton-ecosystem/entities.json
          # Add missing entities report if present
          git add HANDLE-THIS-BEFORE-PULL/canton_missing_entities.txt 2>/dev/null || true
          # Add only NEW logo files (untracked), never modify existing ones
          git add canton-ecosystem/logos/
          git diff --cached --name-only canton-ecosystem/logos/ | while read f; do
            git show HEAD:"$f" > /dev/null 2>&1 && git restore --staged "$f" || true
          done
          TIMESTAMP=$(date +"%Y-%m-%d")
          COUNT=$(python -c "import json; data=json.load(open('canton-ecosystem/entities.json')); print(len(data))")
          git commit -m "chore: update Canton ecosystem — $COUNT entities ($TIMESTAMP)" || echo "Nothing to commit"
          git push origin dev
