name: Update Canton Ecosystem

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run scraper (diff mode — new entities only)
        run: python scrape_canton.py --diff

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet canton-ecosystem/entities.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "canton-bot"
          git config user.email "bot@tokerize.com"
          # Always add entities.json
          git add canton-ecosystem/entities.json
          # Add only NEW logo files (untracked), never modify existing ones
          git add --intent-to-add canton-ecosystem/logos/ 2>/dev/null || true
          git diff --cached --name-only canton-ecosystem/logos/ | while read f; do
            git restore --staged "$f" 2>/dev/null || true
          done
          git add $(git ls-files --others --exclude-standard canton-ecosystem/logos/) 2>/dev/null || true
          TIMESTAMP=$(date +"%Y-%m-%d")
          COUNT=$(python -c "import json; data=json.load(open('canton-ecosystem/entities.json')); print(len(data))")
          git commit -m "chore: update Canton ecosystem — $COUNT entities ($TIMESTAMP)" || echo "Nothing to commit"
          git push origin dev
