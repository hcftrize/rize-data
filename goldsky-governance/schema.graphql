type NftTransferEvent @entity(immutable: true) {
  id: ID!
  tokenId: BigInt!
  from: Bytes!
  to: Bytes!
  isMint: Boolean!
  date: String!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type BondOwner @entity(immutable: false) {
  id: ID!
  tokenId: BigInt!
  owner: Bytes!
  mintDate: String!
  mintTimestamp: BigInt!
  lastTransferDate: String!
  lastTransferTimestamp: BigInt!
  transferCount: Int!
}
