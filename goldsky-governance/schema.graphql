# ── TokensReleasedEvent ───────────────────────────────────────────────────────
type TokensReleasedEvent @entity(immutable: true) {
  id: ID!
  nftId: BigInt!
  to: Bytes!
  amount: BigDecimal!
  date: String!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

# ── BondMigratedEvent ─────────────────────────────────────────────────────────
type BondMigratedEvent @entity(immutable: true) {
  id: ID!
  nftId: BigInt!
  toPool: Int!
  migrator: Bytes!
  date: String!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

# ── VestingUpdatedEvent ───────────────────────────────────────────────────────
type VestingUpdatedEvent @entity(immutable: true) {
  id: ID!
  nftId: BigInt!
  amount: BigDecimal!
  cliff: BigInt!
  vesting: BigInt!
  start: BigInt!
  date: String!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

