# Snapshot du timeMarker après chaque increaseBond
# C'est la seule donnée qu'on ne peut pas reconstituer autrement
type BondTimeMarkerSnapshot @entity(immutable: true) {
  id: ID!                  # tx hash
  nftId: BigInt!
  timeMarker: BigInt!      # nouveau timeMarker post-recalcul
  amount: BigDecimal!      # nouveau montant total bondé
  poolId: Int!
  amountAdded: BigDecimal! # montant ajouté dans cet increaseBond
  date: String!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}
