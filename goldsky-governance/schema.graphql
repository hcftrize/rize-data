# ── bond-created ─────────────────────────────────────────────────────────────

type Bond @entity(immutable: false) {
  id: ID!
  nftId: BigInt!
  owner: Bytes!
  poolId: Int!
  createdAtDate: String!
  createdAtTimestamp: BigInt!
  createdAtBlock: BigInt!
  totalDeposited: BigDecimal!
  increaseCount: Int!
  lastDepositDate: String!
  lastDepositTimestamp: BigInt!
}

type BondCreatedEvent @entity(immutable: true) {
  id: ID!
  nftId: BigInt!
  owner: Bytes!
  poolId: Int!
  amount: BigDecimal!
  date: String!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type IncreaseBondEvent @entity(immutable: true) {
  id: ID!
  nftId: BigInt!
  amount: BigDecimal!
  date: String!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

# ── bond-timemarker ───────────────────────────────────────────────────────────

type BondTimeMarkerSnapshot @entity(immutable: true) {
  id: ID!
  nftId: BigInt!
  timeMarker: BigInt!
  amount: BigDecimal!
  poolId: Int!
  blockNumber: BigInt!
  timestamp: BigInt!
}

