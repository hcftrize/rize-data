# ── nft-transfers ─────────────────────────────────────────────────────────────
# NOTE: requires bondNft contract address — add as second dataSource when available

type NftTransferEvent @entity(immutable: true) {
  id: ID!
  tokenId: BigInt!
  from: Bytes!
  to: Bytes!
  isMint: Boolean!
  date: String!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type BondOwner @entity(immutable: false) {
  id: ID!
