specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: GovernanceBonding
    network: base
    source:
      address: "0x5a134098bDBEb05Da9eAc35439c5624547ed26eE"
      abi: GovernanceBonding
      startBlock: 30245406
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - BondBrokenEvent
      abis:
        - name: GovernanceBonding
          file: ./abis/GovernanceBonding.json
      eventHandlers:
        - event: BondBroken(indexed uint256,uint256)
          handler: handleBondBroken
      file: ./src/mapping.ts
