specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: GovernanceBonding
    network: base
    source:
      address: "0x5a134098bDBEb05Da9eAc35439c5624547ed26eE"
      abi: GovernanceBonding
      startBlock: 28890000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TokensReleasedEvent
        - BondMigratedEvent
        - VestingUpdatedEvent
        - VestedTokenClawedEvent
      abis:
        - name: GovernanceBonding
          file: ./abis/GovernanceBonding.json
      eventHandlers:
        - event: TokensReleased(indexed uint256,indexed address,uint256)
          handler: handleTokensReleased
        - event: BondMigrated(indexed uint256,indexed uint16,indexed address)
          handler: handleBondMigrated
        - event: VestingUpdated(indexed uint256,uint256,uint64,uint64,uint64)
          handler: handleVestingUpdated
        - event: VestedTokenClawed(indexed uint256,uint256,address)
          handler: handleVestedTokenClawed
      file: ./src/mapping.ts
