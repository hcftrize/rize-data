specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: GovernanceBonding
    network: base
    source:
      address: "0x5a134098bDBEb05Da9eAc35439c5624547ed26eE"
      abi: GovernanceBonding
      startBlock: 44821957
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Bond
        - BondCreatedEvent
        - IncreaseBondEvent
        - BondTimeMarkerSnapshot
        - BondBrokenEvent
        - TokensReleasedEvent
        - BondMigratedEvent
        - VestingUpdatedEvent
        - VestedTokenClawedEvent
        - Pool
        - PoolUpdatedEvent
        - ReleaseWarmupUpdatedEvent
        - MigratorAddedEvent
        - MigratorRemovedEvent
      abis:
        - name: GovernanceBonding
          file: ./abis/GovernanceBonding.json
      eventHandlers:
        - event: BondCreated(indexed address,indexed uint256,indexed uint16,uint256)
          handler: handleBondCreated
        - event: BondBroken(indexed uint256,uint256)
          handler: handleBondBroken
        - event: TokensReleased(indexed uint256,indexed address,uint256)
          handler: handleTokensReleased
        - event: BondMigrated(indexed uint256,indexed uint16,indexed address)
          handler: handleBondMigrated
        - event: VestingUpdated(indexed uint256,uint256,uint64,uint64,uint64)
          handler: handleVestingUpdated
        - event: VestedTokenClawed(indexed uint256,uint256,address)
          handler: handleVestedTokenClawed
        - event: PoolUpdated(indexed uint16,uint32,uint32,uint128)
          handler: handlePoolUpdated
        - event: ReleaseWarmupUpdated(uint256)
          handler: handleReleaseWarmupUpdated
        - event: MigratorAdded(indexed address)
          handler: handleMigratorAdded
        - event: MigratorRemoved(indexed address)
          handler: handleMigratorRemoved
      callHandlers:
        - function: increaseBond(uint256,uint256)
          handler: handleIncreaseBond
      file: ./src/mapping.ts

