    name: RizeGovernanceNFT
    network: base
    source:
      address: "0xf33f231b769ccc1c7f74190de14340fbd51879ff"
      abi: RizeGovernanceNFT
      startBlock: 30245406
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - NftTransferEvent
        - BondOwner
      abis:
        - name: RizeGovernanceNFT
          file: ./abis/GovernanceBonding.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
      file: ./src/mapping.ts
